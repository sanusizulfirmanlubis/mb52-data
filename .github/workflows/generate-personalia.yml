name: Generate Personalia Master JSON

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup project
        run: |
          npm init -y
          npm install xlsx

      - name: Generate JSON with Validation
        run: |
          node <<EOF
          const fs = require("fs");
          const path = require("path");
          const XLSX = require("xlsx");

          const REQUIRED_HEADERS = [
            "Wilayah",
            "Nama",
            "NIPP",
            "Level Jabatan",
            "Tingkat Jabatan",
            "Posisi",
            "UPT",
            "TMT Posisi (YYYY-MM-DD)",
            "Grade",
            "Pendidikan",
            "Mulai Dinas (YYYY-MM-DD)",
            "Tanggal Lahir (YYYY-MM-DD)",
            "TMT Pensiun (YYYY-MM-DD)",
            "No PRP",
            "Berlaku PRP (YYYY-MM-DD)",
            "Tingkat PRP",
            "No PMP",
            "Berlaku PMP (YYYY-MM-DD)",
            "Tingkat PMP",
            "No WA"
          ];

          const folderPath = "data/personalia";
          let masterData = [];

          if (!fs.existsSync(folderPath)) {
            throw new Error("Folder personalia tidak ditemukan!");
          }

          const dateRegex = /^\d{4}-\d{2}-\d{2}$/;

          fs.readdirSync(folderPath).forEach((file) => {
            if (!file.endsWith(".xlsx")) return;

            console.log("Checking file:", file);

            const filePath = path.join(folderPath, file);
            const workbook = XLSX.readFile(filePath);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];

            const raw = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            const headers = raw[0];

            // ======================
            // VALIDASI HEADER
            // ======================
            REQUIRED_HEADERS.forEach((req) => {
              if (!headers.includes(req)) {
                throw new Error(
                  `Header "${req}" tidak ditemukan di file ${file}`
                );
              }
            });

            const rows = XLSX.utils.sheet_to_json(sheet);

            rows.forEach((row, index) => {
              const rowNumber = index + 2;

              const nama = (row["Nama"] || "").toString().trim();
              let nippRaw = row["NIPP"];

if (typeof nippRaw === "number") {
  nippRaw = Math.floor(nippRaw).toString();
}

const nipp = (nippRaw || "").toString().trim();
              const pendidikan = (row["Pendidikan"] || "").toString().trim();
              const mulaiDinas = (row["Mulai Dinas (YYYY-MM-DD)"] || "").toString().trim();
              const tglLahir = (row["Tanggal Lahir (YYYY-MM-DD)"] || "").toString().trim();
              const tmtPensiun = (row["TMT Pensiun (YYYY-MM-DD)"] || "").toString().trim();

              const isVacant = nama.toLowerCase() === "vacant";

              // ======================
              // VALIDASI NON-VACANT
              // ======================
              if (!isVacant) {

                if (!nipp) {
                  throw new Error(`Baris ${rowNumber} (${file}): NIPP wajib diisi`);
                }

                if (!/^\d{5}$/.test(nipp)) {
                  throw new Error(`Baris ${rowNumber} (${file}): NIPP harus 5 digit angka`);
                }

                if (!pendidikan) {
                  throw new Error(`Baris ${rowNumber} (${file}): Pendidikan wajib diisi`);
                }

                if (!mulaiDinas) {
                  throw new Error(`Baris ${rowNumber} (${file}): Mulai Dinas wajib diisi`);
                }

                if (!tglLahir) {
                  throw new Error(`Baris ${rowNumber} (${file}): Tanggal Lahir wajib diisi`);
                }

                if (!tmtPensiun) {
                  throw new Error(`Baris ${rowNumber} (${file}): TMT Pensiun wajib diisi`);
                }

                if (!dateRegex.test(mulaiDinas)) {
                  throw new Error(`Baris ${rowNumber} (${file}): Mulai Dinas harus format YYYY-MM-DD`);
                }

                if (!dateRegex.test(tglLahir)) {
                  throw new Error(`Baris ${rowNumber} (${file}): Tanggal Lahir harus format YYYY-MM-DD`);
                }

                if (!dateRegex.test(tmtPensiun)) {
                  throw new Error(`Baris ${rowNumber} (${file}): TMT Pensiun harus format YYYY-MM-DD`);
                }
              }

              // ======================
              // VALIDASI VACANT
              // ======================
              if (isVacant) {
                // Optional: pastikan NIPP kosong jika Vacant
                // if (nipp) {
                //   throw new Error(`Baris ${rowNumber} (${file}): Vacant tidak boleh memiliki NIPP`);
                // }
              }
            });

            masterData = masterData.concat(rows);
          });

          fs.writeFileSync(
            "data/personalia_master.json",
            JSON.stringify(masterData, null, 2)
          );

          console.log("Master JSON generated successfully");
          EOF

      - name: Commit JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/personalia_master.json
          git commit -m "Auto generate personalia_master.json" || echo "No changes"
          git push
