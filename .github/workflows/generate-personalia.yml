name: Generate Personalia Master JSON

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install xlsx

      - name: Run Generator
        run: node scripts/generate-personalia.js

      - name: Commit JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/personalia_master.json
          git commit -m "Auto generate personalia_master.json" || echo "No changes"
          git push
